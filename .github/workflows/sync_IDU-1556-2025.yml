name: Sync IDU-1556-2025 → Supabase

on:
  schedule:
    - cron: '0 14 * * 1-6'  # 9:00 AM COT (UTC-5)
    - cron: '0 18 * * 1-6'  # 1:00 PM COT (UTC-5)
    - cron: '0 22 * * 1-6'  # 5:00 PM COT (UTC-5)

  workflow_dispatch:

jobs:
  sync:
    name: Sincronizar IDU-1556-2025
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar sync
        env:
          # Secrets compartidos (mismos para todos los contratos de la empresa)
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:         ${{ secrets.SUPABASE_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          # Secrets compartidos de cuenta QFieldCloud
          QFIELD_USER:          ${{ secrets.QFIELD_USER }}
          QFIELD_PASSWORD:      ${{ secrets.QFIELD_PASSWORD }}
          # Secrets específicos de este contrato
          QFIELD_PROJECT_NAME:  ${{ secrets.QFIELD_PROJECT_NAME_1556 }}
          CONTRATO_ID:          ${{ secrets.CONTRATO_ID_1556 }}
        run: python sync/sync_qfield.py
