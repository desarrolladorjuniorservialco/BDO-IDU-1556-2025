name: Sync → Supabase

on:
  schedule:
    - cron: '0 14 * * 1-6'  # 9:00 AM COT (UTC-5)
    - cron: '0 18 * * 1-6'  # 1:00 PM COT (UTC-5)
    - cron: '0 22 * * 1-6'  # 5:00 PM COT (UTC-5)
  workflow_dispatch:

jobs:
  load-contracts:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: set
        run: echo "matrix=$(cat contracts.json)" >> $GITHUB_OUTPUT

  sync:
    needs: load-contracts
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      matrix: ${{ fromJson(needs.load-contracts.outputs.matrix) }}
      fail-fast: false
    name: Sync ${{ matrix.contrato_id }}
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar sync
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:         ${{ secrets.SUPABASE_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          QFIELD_USER:          ${{ secrets.QFIELD_USER }}
          QFIELD_PASSWORD:      ${{ secrets.QFIELD_PASSWORD }}
          QFIELD_PROJECT_NAME:  ${{ matrix.project_name }}
          CONTRATO_ID:          ${{ matrix.contrato_id }}
        run: python -m sync.sync_qfield
