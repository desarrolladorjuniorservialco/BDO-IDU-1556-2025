[ui]
# Oculta la navegación multi-página automática de Streamlit.
# La app usa navegación personalizada en sidebar.py.
hideSidebarNav = true

[theme]
# Paleta institucional IDU 2025 — modo claro por defecto.
# Sincroniza los componentes nativos de Streamlit (dataframes, inputs, etc.)
# con el CSS personalizado del dashboard BDO.
base                     = "light"
primaryColor             = "#00A6E1"   # Azul IDU — botones, sliders, checkboxes
backgroundColor          = "#EDF1F6"   # Gris Neutro — fondo general
secondaryBackgroundColor = "#FFFFFF"   # Blanco — tarjetas, sidebar inputs
textColor                = "#4D4D4D"   # Gris Texto — lectura larga
